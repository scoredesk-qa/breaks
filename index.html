<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BreakTrack</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0d;--surface:#171717;--card:#1c1c1c;--border:#2a2a2a;
      --accent:#3ECF8E;--acc-dim:rgba(62,207,142,.10);--acc-ring:rgba(62,207,142,.22);
      --text:#eeeeee;--muted:#777777;--danger:#f05252;--danger-dim:rgba(240,82,82,.10);
      --yellow:#eab308;--font:'Manrope',sans-serif;
    }
    html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;}

    /* ── Splash ── */
    .splash{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
    .splash-logo{display:flex;align-items:center;gap:10px}
    .spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    .spinner-sm{width:16px;height:16px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--bg);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Setup / Login ── */
    .login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
      background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(62,207,142,.06) 0%,transparent 70%)}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
      padding:40px 36px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.5)}
    .login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
    .login-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
    .login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.6}

    /* ── Logo mark ── */
    .logo-mark{background:var(--accent);color:#000;border-radius:8px;display:flex;align-items:center;
      justify-content:center;width:30px;height:30px;flex-shrink:0}
    .logo-mark.sm{width:24px;height:24px;border-radius:6px}
    .logo-text{font-size:16px;font-weight:800;letter-spacing:-.3px}

    /* ── Fields ── */
    .field-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .field-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
    .field-input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;
      color:var(--text);font-size:14px;font-family:var(--font);outline:none;width:100%;transition:border .18s,box-shadow .18s}
    .field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--acc-ring)}
    .field-input::placeholder{color:#333}
    .field-input option{background:var(--card)}
    .input-wrap{position:relative}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:var(--muted);cursor:pointer;display:flex;padding:4px;transition:color .15s}
    .eye-btn:hover{color:var(--text)}

    /* ── Buttons ── */
    .btn-primary{background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 18px;
      font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;
      display:inline-flex;align-items:center;gap:7px;transition:opacity .15s,transform .12s;white-space:nowrap}
    .btn-primary:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary.full{width:100%;justify-content:center;margin-top:4px}
    .btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;
      padding:9px 16px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;
      display:inline-flex;align-items:center;gap:7px;transition:border-color .15s;white-space:nowrap}
    .btn-secondary:hover{border-color:var(--accent)}
    .icon-btn{background:none;border:1px solid transparent;border-radius:6px;color:var(--muted);
      cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
      padding:6px;transition:color .15s,background .15s;font-family:var(--font)}
    .icon-btn:hover{color:var(--text);background:var(--card)}
    .icon-btn.danger:hover{color:var(--danger)}
    .icon-btn.muted{opacity:.45}.icon-btn.muted:hover{opacity:1}

    /* ── Alert ── */
    .alert-error{display:flex;align-items:center;gap:7px;color:var(--danger);font-size:13px;
      background:var(--danger-dim);border:1px solid rgba(240,82,82,.2);border-radius:8px;
      padding:9px 12px;margin-bottom:12px}
    .alert-info{display:flex;align-items:flex-start;gap:8px;color:var(--muted);font-size:12.5px;
      background:var(--card);border:1px solid var(--border);border-radius:8px;
      padding:12px 14px;margin-top:16px;line-height:1.6}

    /* ── Setup steps ── */
    .steps{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
    .step{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--muted);line-height:1.5}
    .step-num{background:var(--acc-dim);color:var(--accent);border:1px solid var(--acc-ring);
      border-radius:50%;width:22px;height:22px;min-width:22px;display:flex;align-items:center;
      justify-content:center;font-size:11px;font-weight:700;margin-top:1px}

    /* ── Agent layout ── */
    .agent-root{min-height:100vh;display:flex;flex-direction:column}
    .agent-header{background:var(--surface);border-bottom:1px solid var(--border);
      padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:10}
    .agent-body{flex:1;max-width:680px;margin:0 auto;width:100%;padding:32px 20px;
      display:flex;flex-direction:column;gap:20px}

    /* ── Break card ── */
    .break-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    .break-card-top{padding:48px 32px 32px;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center}
    .break-card-btns{border-top:1px solid var(--border);padding:20px 32px;display:flex;justify-content:center}
    .pulse-ring{padding:12px;border-radius:50%;background:var(--card);border:2px solid var(--border);transition:all .3s}
    .pulse-ring.active{background:var(--acc-dim);border-color:var(--acc-ring);animation:pulse-anim 2s ease-in-out infinite}
    @keyframes pulse-anim{0%,100%{box-shadow:0 0 0 0 var(--acc-ring)}50%{box-shadow:0 0 0 12px transparent}}
    .break-icon{color:var(--muted);transition:color .3s;display:flex}
    .break-icon.on{color:var(--accent)}
    .timer-display{font-size:54px;font-weight:800;letter-spacing:-2px;color:var(--accent);font-variant-numeric:tabular-nums}
    .timer-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
    .timer-since{font-size:13px;color:var(--muted)}
    .idle-label{font-size:18px;font-weight:700}
    .idle-sub{font-size:13px;color:var(--muted)}
    .btn-start{background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px 36px;
      font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;
      display:flex;align-items:center;gap:8px;transition:opacity .15s,transform .12s}
    .btn-start:hover{opacity:.88;transform:translateY(-1px)}
    .btn-stop{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(240,82,82,.25);
      border-radius:10px;padding:13px 36px;font-size:15px;font-weight:700;font-family:var(--font);
      cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
    .btn-stop:hover{background:rgba(240,82,82,.18)}

    /* ── Section card ── */
    .section-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .section-card.mt{margin-top:20px}
    .section-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;
      align-items:center;gap:8px}
    .section-title{font-size:13px;font-weight:700;letter-spacing:.1px}
    .section-ic{color:var(--muted);display:flex}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
      animation:pulse-anim 1.5s ease-in-out infinite;flex-shrink:0}

    /* ── Admin layout ── */
    .admin-root{display:flex;min-height:100vh}
    .sidebar{width:216px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);
      display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
    .sidebar-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .sidebar-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
    .nav-item{background:none;border:none;border-radius:8px;padding:9px 12px;
      display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;font-weight:600;
      font-family:var(--font);cursor:pointer;transition:background .15s,color .15s;text-align:left;width:100%}
    .nav-item:hover{background:var(--card);color:var(--text)}
    .nav-item.active{background:var(--acc-dim);color:var(--accent)}
    .nav-arrow{margin-left:auto;display:flex}
    .sidebar-footer{padding:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .sidebar-user{flex:1;min-width:0}
    .sidebar-name{font-size:13px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sidebar-role{font-size:11px;color:var(--muted);display:block}
    .admin-main{flex:1;min-width:0;overflow-x:auto}

    /* ── Panel ── */
    .panel{padding:28px 28px}
    .panel-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .panel-title{font-size:20px;font-weight:800;letter-spacing:-.4px}
    .panel-sub{font-size:13px;color:var(--muted);margin-top:3px}
    .panel-hd-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

    /* ── Stats ── */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
      padding:20px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
    .stat-card.accent{border-color:var(--acc-ring);background:var(--acc-dim)}
    .stat-ic{color:var(--muted);display:flex}
    .stat-card.accent .stat-ic{color:var(--accent)}
    .stat-value{font-size:28px;font-weight:800;letter-spacing:-1px}
    .stat-label{font-size:12px;color:var(--muted);font-weight:500}

    /* ── Table ── */
    .data-table{width:100%;border-collapse:collapse;font-size:13.5px}
    .data-table th{text-align:left;padding:10px 16px;font-size:11px;font-weight:700;color:var(--muted);
      text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
    .data-table td{padding:13px 16px;border-bottom:1px solid #1e1e1e;vertical-align:middle}
    .data-table tbody tr:last-child td{border-bottom:none}
    .data-table tbody tr:hover td{background:rgba(255,255,255,.02)}

    /* ── Avatar ── */
    .avatar{width:28px;height:28px;border-radius:50%;background:var(--acc-dim);color:var(--accent);
      font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;border:1px solid var(--acc-ring)}
    .flex-c{display:flex;align-items:center}
    .header-name{font-size:13px;font-weight:600;color:var(--muted)}

    /* ── Badges ── */
    .badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;
      padding:3px 9px;border-radius:20px;letter-spacing:.2px}
    .badge-done{background:#0f2b1e;color:#3ECF8E;border:1px solid #1a4030}
    .badge-active{background:#2b1e00;color:#eab308;border:1px solid #3d2e00}
    .badge-admin{background:var(--acc-dim);color:var(--accent);border:1px solid var(--acc-ring)}
    .badge-agent{background:var(--card);color:var(--muted);border:1px solid var(--border)}

    /* ── Modal ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;
      align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;
      width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,.6);animation:slideUp .2s ease}
    @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
    .modal-hd{display:flex;align-items:center;justify-content:space-between;
      padding:20px 24px;border-bottom:1px solid var(--border)}
    .modal-title{font-size:15px;font-weight:700}
    .modal-body{padding:24px}
    .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

    /* ── Search / misc ── */
    .search-input{background:var(--card);border:1px solid var(--border);border-radius:8px;
      padding:8px 14px;color:var(--text);font-size:13px;font-family:var(--font);
      outline:none;width:180px;transition:border .18s}
    .search-input:focus{border-color:var(--accent)}
    .search-input::placeholder{color:#333}
    .saved-badge{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--accent);font-weight:600}
    .info-box{background:var(--card);border:1px solid var(--border);border-radius:10px;
      padding:14px 18px;font-size:13px;color:var(--muted)}
    .info-list{padding-left:18px;line-height:2.2}
    .settings-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
    .settings-heading{font-size:15px;font-weight:700;margin-bottom:8px}
    .settings-desc{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6}
    .empty-state{padding:48px 24px;text-align:center;color:var(--muted);
      display:flex;flex-direction:column;align-items:center;gap:12px;font-size:13px}
    .empty-ic{opacity:.25;display:flex}
    .mono{font-family:'Courier New',monospace}
    .gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
    .mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}

    @media(max-width:900px){
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .sidebar{width:52px}
      .sidebar-logo span,.sidebar-name,.sidebar-role,.nav-item span,.sidebar-user,.nav-arrow{display:none}
      .nav-item{justify-content:center;padding:12px}
      .sidebar-footer{justify-content:center;padding:12px}
      .sidebar-logo{justify-content:center;padding:12px}
      .panel{padding:20px 14px}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── SVG Icon engine ──────────────────────────────────────────────────────── */
const P = {
  zap:       "M13 2L3 14h9l-1 8 10-12h-9z",
  logout:    ["M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4","M16 17l5-5-5-5","M21 12H9"],
  coffee:    ["M18 8h1a4 4 0 0 1 0 8h-1","M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z","M6 1v3","M10 1v3","M14 1v3"],
  timer:     ["M10 2h4","M12 14l4-4","M12 22a8 8 0 1 0 0-16 8 8 0 0 0 0 16z"],
  play:      "M5 3l14 9-14 9V3z",
  stop:      "M6 6h12v12H6z",
  clock:     ["M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z","M12 6v6l4 2"],
  users:     ["M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2","M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z","M23 21v-2a4 4 0 0 0-3-3.87","M16 3.13a4 4 0 0 1 0 7.75"],
  dashboard: ["M3 3h7v7H3z","M14 3h7v7h-7z","M14 14h7v7h-7z","M3 14h7v7H3z"],
  settings:  ["M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z","M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"],
  chevron:   "M9 18l6-6-6-6",
  plus:      ["M12 5v14","M5 12h14"],
  trash:     ["M3 6h18","M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"],
  download:  ["M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4","M7 10l5 5 5-5","M12 15V3"],
  eye:       ["M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z","M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"],
  eyeOff:    ["M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94","M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19","M1 1l22 22","M10.59 10.59A3 3 0 0 0 14.83 15"],
  alert:     ["M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z","M12 9v4","M12 17h.01"],
  check:     ["M22 11.08V12a10 10 0 1 1-5.93-9.14","M22 4L12 14.01l-3-3"],
  x:         ["M18 6L6 18","M6 6l12 12"],
  activity:  "M22 12h-4l-3 9L9 3l-3 9H2",
  trending:  ["M23 6l-9.5 9.5-5-5L1 18","M17 6h6v6"],
  database:  ["M12 2a9 3 0 1 0 0 6A9 3 0 0 0 12 2z","M3 5v4a9 3 0 0 0 18 0V5","M3 9v4a9 3 0 0 0 18 0V9","M3 13v4a9 3 0 0 0 18 0v-4"],
  key:       ["M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"],
  refresh:   ["M23 4v6h-6","M1 20v-6h6","M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"],
};

const Ic = ({ n, size=16, sw=1.8 }) => {
  const d = P[n];
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"
      style={{display:'inline-block',flexShrink:0,verticalAlign:'middle'}}>
      {Array.isArray(d) ? d.map((p,i)=><path key={i} d={p}/>) : <path d={d}/>}
    </svg>
  );
};

/* ─── Helpers ──────────────────────────────────────────────────────────────── */
const fmt    = d => new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const fmtD   = d => new Date(d).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});
const pad    = n => String(n).padStart(2,'0');
const tStr   = ms => { const s=Math.floor(ms/1000); return `${pad(Math.floor(s/60))}:${pad(s%60)}`; };
const durStr = ms => {
  if(!ms) return '—';
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  return h>0?`${h}h ${m%60}m ${s%60}s`:m>0?`${m}m ${s%60}s`:`${s}s`;
};
const uid    = () => Math.random().toString(36).slice(2,10);
const ini    = name => name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

/* ─── JSONBin API ──────────────────────────────────────────────────────────── */
const JB_BASE = 'https://api.jsonbin.io/v3';

async function jbRead(cfg) {
  const r = await fetch(`${JB_BASE}/b/${cfg.binId}/latest`, {
    headers: { 'X-Master-Key': cfg.key, 'X-Bin-Meta': 'false' }
  });
  if (!r.ok) throw new Error('Read failed');
  return r.json();
}

async function jbWrite(cfg, data) {
  const r = await fetch(`${JB_BASE}/b/${cfg.binId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': cfg.key },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('Write failed');
  return r.json();
}

async function jbCreate(key) {
  const initial = {
    users: [{ id:'admin-001', name:'Administrator', email:'admin@company.com', password:'Admin2024!', role:'admin' }],
    logs: []
  };
  const r = await fetch(`${JB_BASE}/b`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': key, 'X-Bin-Name': 'BreakTrack', 'X-Bin-Private': 'true' },
    body: JSON.stringify(initial)
  });
  if (!r.ok) throw new Error('Create failed — check your API key');
  const j = await r.json();
  return j.metadata.id;
}

/* Safe write: fetch latest → merge → write */
async function safeWrite(cfg, mutate) {
  const latest = await jbRead(cfg);
  const updated = mutate(latest);
  await jbWrite(cfg, updated);
  return updated;
}

/* ─── Export CSV ───────────────────────────────────────────────────────────── */
function exportCSV(logs) {
  const hdr = 'Agent,Date,Break Start,Return Time,Duration,Status\n';
  const rows = logs.map(l =>
    `"${l.agent}","${fmtD(l.start)}","${fmt(l.start)}","${l.end?fmt(l.end):''}","${l.end?durStr(l.end-l.start):''}","${l.end?'Returned':'On Break'}"`
  ).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([hdr+rows],{type:'text/csv'}));
  a.download = `break-logs-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

/* ══════════════════════════════════════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════════════════════════════════════ */
function App() {
  const [cfg,     setCfg]     = useState(null);   // {key, binId}
  const [data,    setData]    = useState(null);   // {users, logs}
  const [session, setSession] = useState(null);
  const [phase,   setPhase]   = useState('boot'); // boot | setup | login | app

  /* Load config from localStorage on start */
  useEffect(() => {
    const stored = localStorage.getItem('bt_cfg');
    if (stored) {
      const c = JSON.parse(stored);
      setCfg(c);
      jbRead(c).then(d => { setData(d); setPhase('login'); })
               .catch(() => { setPhase('setup'); });
    } else {
      setPhase('setup');
    }
  }, []);

  const onSetup = async (c, d) => {
    localStorage.setItem('bt_cfg', JSON.stringify(c));
    setCfg(c); setData(d); setPhase('login');
  };

  const login = (email, password) => {
    const u = data.users.find(x => x.email.toLowerCase()===email.toLowerCase() && x.password===password);
    if (u) { setSession(u); setPhase('app'); return null; }
    return 'Invalid email or password.';
  };

  const logout = () => { setSession(null); setPhase('login'); };

  const syncData = async (mutate) => {
    try {
      const updated = await safeWrite(cfg, mutate);
      setData(updated);
    } catch(e) { alert('Save failed — check your connection.'); }
  };

  const refreshData = async () => {
    try { const d = await jbRead(cfg); setData(d); } catch {}
  };

  if (phase==='boot') return <Splash />;
  if (phase==='setup') return <Setup onDone={onSetup} />;
  if (phase==='login') return <Login onLogin={login} />;
  if (!session || !data) return <Splash />;

  if (session.role==='admin')
    return <Admin session={session} data={data} syncData={syncData} onLogout={logout} onRefresh={refreshData} />;
  return <Agent session={session} data={data} syncData={syncData} onLogout={logout} />;
}

function Agent({ session, data, syncData, onLogout }) {

  const timerRef = useRef(null);

  const myLogs = data.logs.filter(l=>l.agentId===session.id).sort((a,b)=>b.start-a.start);

  useEffect(()=>{
    if(active){ timerRef.current=setInterval(()=>setElapsed(Date.now()-active.start),1000); }
    else { clearInterval(timerRef.current); setElapsed(0); }
    return ()=>clearInterval(timerRef.current);
  },[active]);

  const startBreak = async () => {
    const entry = { id:uid(), agentId:session.id, agent:session.name, start:Date.now(), end:null };
    setActive({id:entry.id, start:entry.start});

            {active ? (
              <>
                <div className="timer-display">{tStr(elapsed)}</div>
                <div className="timer-label">On Break</div>
                <div className="timer-since">Started at {fmt(active.start)}</div>

      </div>

      <table className="data-table">
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th></th></tr></thead>
        <tbody>
          {users.map(u=>(
            <tr key={u.id}>
              <td><AvatarCell name={u.name}/></td>
              <td style={{color:'var(--muted)',fontSize:13}}>{u.email}</td>
              <td><span className={`badge ${u.role==='admin'?'badge-admin':'badge-agent'}`}>{u.role}</span></td>
              <td>
                {u.id!==session.id && (
                  delId===u.id
                    ? <div className="flex-c gap4">
                        <button className="icon-btn danger" onClick={()=>del(u.id)}><Ic n="check" size={14}/></button>
                        <button className="icon-btn" onClick={()=>setDelId(null)}><Ic n="x" size={14}/></button>
                      </div>
                    : <button className="icon-btn muted" onClick={()=>setDelId(u.id)} title="Delete user"><Ic n="trash" size={14}/></button>
                )}
              </td>
            </tr>
          ))}
        </tbody>
      </table>

      {modal && (
        <Modal title="Add New User" onClose={()=>{setModal(false);setErr('')}}>
          <div className="field-group">
            <label className="field-label">Full Name</label>
            <input className="field-input" placeholder="Jane Smith" value={form.name}
              onChange={e=>{setForm({...form,name:e.target.value});setErr('')}} autoFocus/>
          </div>
          <div className="field-group">
            <label className="field-label">Email Address</label>
            <input className="field-input" type="email" placeholder="jane@company.com" value={form.email}
              onChange={e=>{setForm({...form,email:e.target.value});setErr('')}}/>
          </div>
          <div className="field-group">
            <label className="field-label">Password</label>
            <div className="input-wrap">
              <input className="field-input" type={show?'text':'password'} placeholder="Set a password"
                value={form.password} onChange={e=>{setForm({...form,password:e.target.value});setErr('')}}
                style={{paddingRight:44}}/>
              <button className="eye-btn" onClick={()=>setShow(!show)}><Ic n={show?'eyeOff':'eye'} size={15}/></button>
            </div>
          </div>
          <div className="field-group">
            <label className="field-label">Role</label>
            <select className="field-input" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
              <option value="agent">Agent</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          {err&&<div className="alert-error"><Ic n="alert" size={14}/> {err}</div>}
          <div className="modal-footer">
            <button className="btn-secondary" onClick={()=>{setModal(false);setErr('')}}>Cancel</button>
            <button className="btn-primary" onClick={save}>Create User</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ─── Settings ───────────────────────────────────────────────────────────── */
function AdminSettings() {
  const reset = () => {
    if(confirm('This will disconnect BreakTrack from JSONBin on this device. The data in JSONBin is NOT deleted. Continue?')) {
      localStorage.removeItem('bt_cfg');
      window.location.reload();
    }
  };
  return (
    <div className="panel">
      <div className="panel-hd">
        <div>
          <h1 className="panel-title">Settings</h1>
          <p className="panel-sub">Database and account configuration</p>
        </div>
      </div>

      <div className="settings-block">
        <h2 className="settings-heading">Database Connection</h2>
        <p className="settings-desc">
          Your JSONBin API key and Bin ID are stored in this browser's local storage. Your data in JSONBin is always safe — resetting here only removes the local connection config.
        </p>
        <button className="btn-secondary" onClick={reset}><Ic n="refresh" size={14}/> Reset connection on this device</button>
      </div>

      <div className="settings-block">
        <h2 className="settings-heading">Sharing with your team</h2>
        <p className="settings-desc">
          Every agent and admin needs to open the app URL and complete the setup using the <strong style={{color:'var(--text)'}}>same JSONBin API key and Bin ID</strong>. All data is shared in real time through JSONBin.
        </p>
        <div className="info-box">
          <p style={{marginBottom:6,fontWeight:600,color:'var(--text)'}}>Recommended setup flow:</p>
          <ol className="info-list">
            <li>Admin sets up the bin and notes the Bin ID from JSONBin dashboard</li>
            <li>Share the API key + Bin ID securely with all agents</li>
            <li>Each agent opens the app URL and enters the same credentials</li>
            <li>Agents can then be added/removed via the Users tab</li>
          </ol>
        </div>
      </div>

      <div className="settings-block">
        <h2 className="settings-heading">Default admin account</h2>
        <p className="settings-desc">
          A default admin account is created automatically when you first set up the bin. Change its password or delete it via the Users tab once you've created your own admin account.
        </p>
        <div className="info-box" style={{fontFamily:'monospace',fontSize:13}}>
          admin@company.com &nbsp;/&nbsp; Admin2024!
        </div>
      </div>
    </div>
  );
}

/* ─── Shared components ──────────────────────────────────────────────────── */
function StatCard({ n, label, value, accent }) {
  return (
    <div className={`stat-card${accent?' accent':''}`}>
      <div className="stat-ic"><Ic n={n} size={16} sw={1.8}/></div>
      <div className="stat-value">{value}</div>
      <div className="stat-label">{label}</div>
    </div>
  );
}

function AvatarCell({ name }) {
  return (
    <div className="flex-c gap10">
      <div className="avatar">{ini(name)}</div>
      <span>{name}</span>
    </div>
  );
}

function LiveElapsed({ start }) {
  const [e, setE] = useState(Date.now()-start);
  useEffect(()=>{ const id=setInterval(()=>setE(Date.now()-start),1000); return ()=>clearInterval(id); },[start]);
  return <span className="mono" style={{color:'var(--accent)',fontWeight:700}}>{tStr(e)}</span>;
}

function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-hd">
          <h3 className="modal-title">{title}</h3>
          <button className="icon-btn" onClick={onClose}><Ic n="x" size={16}/></button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}

/* ─── Boot ───────────────────────────────────────────────────────────────── */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
