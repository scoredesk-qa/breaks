<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BreakTrack</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#141414;--card:#1a1a1a;--border:#252525;
  --accent:#3ECF8E;--acc-dim:rgba(62,207,142,.10);--acc-ring:rgba(62,207,142,.20);
  --text:#ededed;--muted:#666;--danger:#f05252;--warn:#eab308;
  --danger-dim:rgba(240,82,82,.10);--warn-dim:rgba(234,179,8,.10);
  --font:'Manrope',sans-serif;
}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
.splash{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.spin{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite}
.spin-sm{width:15px;height:15px;border:2px solid rgba(0,0,0,.25);border-top-color:#000;border-radius:50%;animation:rot .7s linear infinite;display:inline-block}
@keyframes rot{to{transform:rotate(360deg)}}
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(62,207,142,.06) 0%,transparent 70%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.auth-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.auth-sub{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.6}
.logo-mark{background:var(--accent);color:#000;border-radius:8px;display:flex;align-items:center;justify-content:center;width:30px;height:30px;flex-shrink:0}
.logo-mark.sm{width:24px;height:24px;border-radius:6px}
.logo-text{font-size:16px;font-weight:800;letter-spacing:-.3px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.fi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;width:100%;transition:border .18s,box-shadow .18s}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--acc-ring)}
.fi::placeholder{color:#333}
.fi option{background:var(--card)}
.iw{position:relative}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;display:flex;padding:4px}
.eye-btn:hover{color:var(--text)}
.bp{background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:opacity .15s,transform .12s;white-space:nowrap}
.bp:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
.bp:disabled{opacity:.4;cursor:not-allowed}
.bp.full{width:100%;justify-content:center;margin-top:4px}
.bs{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:border-color .15s;white-space:nowrap}
.bs:hover{border-color:var(--accent)}
.ib{background:none;border:1px solid transparent;border-radius:6px;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:6px;transition:color .15s,background .15s}
.ib:hover{color:var(--text);background:var(--card)}
.aerr{display:flex;align-items:center;gap:7px;color:var(--danger);font-size:13px;background:var(--danger-dim);border:1px solid rgba(240,82,82,.2);border-radius:8px;padding:9px 12px;margin-bottom:12px}
.awarn{display:flex;align-items:center;gap:8px;color:var(--warn);font-size:13px;background:var(--warn-dim);border:1px solid rgba(234,179,8,.25);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-weight:600}
/* Agent */
.ag-root{min-height:100vh;display:flex;flex-direction:column}
.ag-hd{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.ag-body{flex:1;max-width:700px;margin:0 auto;width:100%;padding:32px 20px;display:flex;flex-direction:column;gap:20px}
.bcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.bcard-top{padding:44px 32px 28px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
.bcard-foot{border-top:1px solid var(--border);padding:20px 32px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.pulse-ring{padding:14px;border-radius:50%;background:var(--card);border:2px solid var(--border);transition:all .3s}
.pulse-ring.on{background:var(--acc-dim);border-color:var(--acc-ring);animation:pulse-a 2s ease-in-out infinite}
@keyframes pulse-a{0%,100%{box-shadow:0 0 0 0 var(--acc-ring)}50%{box-shadow:0 0 0 14px transparent}}
.bic{color:var(--muted);display:flex;transition:color .3s}
.bic.on{color:var(--accent)}
.timer-big{font-size:58px;font-weight:800;letter-spacing:-2px;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
.timer-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
.timer-type{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:2px}
.timer-since{font-size:13px;color:var(--muted)}
.idle-lbl{font-size:18px;font-weight:700}
.idle-sub{font-size:13px;color:var(--muted)}
.btn-start{background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:8px;transition:opacity .15s,transform .12s}
.btn-start:hover{opacity:.88;transform:translateY(-1px)}
.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-stop{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(240,82,82,.25);border-radius:10px;padding:13px 36px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
.btn-stop:hover{background:rgba(240,82,82,.18)}
.day-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.day-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:6px}
.day-stat-val{font-size:22px;font-weight:800;letter-spacing:-.5px}
.day-stat-lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.sc.mt{margin-top:8px}
.sc-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sc-title{font-size:13px;font-weight:700}
.sc-ic{color:var(--muted);display:flex}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse-a 1.5s ease-in-out infinite;flex-shrink:0}
/* Admin */
.adm-root{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.nav-item{background:none;border:none;border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .15s,color .15s;text-align:left;width:100%}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.on{background:var(--acc-dim);color:var(--accent)}
.nav-arr{margin-left:auto;display:flex}
.sb-foot{padding:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-user{flex:1;min-width:0}
.sb-name{font-size:13px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-role{font-size:11px;color:var(--muted);display:block}
.adm-main{flex:1;min-width:0;overflow-x:auto}
.panel{padding:28px}
.phd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.ptitle{font-size:20px;font-weight:800;letter-spacing:-.4px}
.psub{font-size:13px;color:var(--muted);margin-top:3px}
.phd-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:8px}
.stat.ac{border-color:var(--acc-ring);background:var(--acc-dim)}
.stat.wn{border-color:rgba(234,179,8,.3);background:var(--warn-dim)}
.stat-ic{color:var(--muted);display:flex}
.stat.ac .stat-ic{color:var(--accent)}
.stat.wn .stat-ic{color:var(--warn)}
.stat-val{font-size:28px;font-weight:800;letter-spacing:-1px}
.stat-lbl{font-size:12px;color:var(--muted);font-weight:500}
.dt{width:100%;border-collapse:collapse;font-size:13.5px}
.dt th{text-align:left;padding:10px 16px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
.dt td{padding:12px 16px;border-bottom:1px solid #1c1c1c;vertical-align:middle}
.dt tbody tr:last-child td{border-bottom:none}
.dt tbody tr:hover td{background:rgba(255,255,255,.018)}
.av{width:28px;height:28px;border-radius:50%;background:var(--acc-dim);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--acc-ring)}
.hd-name{font-size:13px;font-weight:600;color:var(--muted)}
.fc{display:flex;align-items:center}
.g4{gap:4px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}
.es{padding:48px 20px;text-align:center;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:10px;font-size:13px}
.es-ic{opacity:.2;display:flex}
.mono{font-family:'Courier New',monospace}
.ac-txt{color:var(--accent)}
.si{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;width:180px;transition:border .18s}
.si:focus{border-color:var(--accent)}
.si::placeholder{color:#333}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.b-done{background:#0f2b1e;color:#3ECF8E;border:1px solid #1a4030}
.b-active{background:#2b1e00;color:#eab308;border:1px solid #3d2e00}
.b-lunch{background:#1a0d2b;color:#a78bfa;border:1px solid #2d1a4a}
.b-bath{background:#0d1f2b;color:#67e8f9;border:1px solid #1a3540}
.b-break{background:#1e1f0d;color:#86efac;border:1px solid #2b3016}
.sblock{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
.sh{font-size:15px;font-weight:700;margin-bottom:8px}
.sd{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.num-input{display:flex;align-items:center;gap:12px}
.num-btn{width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s;line-height:1}
.num-btn:hover{border-color:var(--accent);color:var(--accent)}
.num-val{font-size:32px;font-weight:800;color:var(--accent);min-width:50px;text-align:center}
/* Realtime pill */
.rt-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--accent);background:var(--acc-dim);border:1px solid var(--acc-ring);border-radius:20px;padding:3px 10px}
.rt-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse-a 1.2s ease-in-out infinite}
/* Error box */
.err-box{background:var(--danger-dim);border:1px solid rgba(240,82,82,.25);border-radius:10px;padding:16px 20px;color:var(--danger);font-size:13px;line-height:1.6;margin-bottom:16px}
@media(max-width:900px){
  .sg4{grid-template-columns:repeat(2,1fr)}
  .sg3{grid-template-columns:repeat(2,1fr)}
  .day-bar{grid-template-columns:1fr 1fr}
  .sidebar{width:52px}
  .sb-logo span,.sb-name,.sb-role,.nav-item span,.sb-user,.nav-arr{display:none}
  .nav-item{justify-content:center;padding:12px}
  .sb-foot{justify-content:center;padding:12px}
  .sb-logo{justify-content:center;padding:12px}
  .panel{padding:18px 12px}
}
</style>

};
const Ic = ({ n, size=16, sw=1.8 }) => {
  const d = P[n];
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"
      style={{display:'inline-block',flexShrink:0,verticalAlign:'middle'}}>
      {Array.isArray(d) ? d.map((p,i)=><path key={i} d={p}/>) : <path d={d}/>}
    </svg>
  );
};

/* ── Helpers ────────────────────────────────────────────────────────────── */
const pad    = n  => String(n).padStart(2,'0');
const tStr   = s  => `${pad(Math.floor(s/3600)>0?Math.floor(s/3600):Math.floor(s/60))}:${Math.floor(s/3600)>0?pad(Math.floor((s%3600)/60))+':':''}${pad(s%60)}`.replace(/^0:/,'');
const tStrMs = ms => tStr(Math.max(0,Math.floor(ms/1000)));
const fmt    = d  => new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const fmtD   = d  => new Date(d).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
const todayISO = () => new Date().toISOString().slice(0,10);
const ini    = n  => (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

const durStr = secs => {
  if(secs==null) return '—';
  const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60), s=secs%60;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m ${s}s`;
  return `${s}s`;
};

const breakType = secs => {
  if(secs==null) return null;
  if(secs>=3600) return 'Lunch Break';
  if(secs>=900)  return 'Break';
  return 'Bathroom Break';
};

const TYPE_CLS = { 'Lunch Break':'b-lunch','Break':'b-break','Bathroom Break':'b-bath' };

function exportCSV(logs) {
  const hdr = 'Agent,Date,Start,Return,Duration (s),Type\n';
  const rows = logs.map(l=>{
    const dur = l.end_time ? Math.round((new Date(l.end_time)-new Date(l.start_time))/1000) : '';
    return `"${l.agent_name}","${fmtD(l.start_time)}","${fmt(l.start_time)}","${l.end_time?fmt(l.end_time):''}","${dur}","${l.break_type||''}"`;
  }).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([hdr+rows],{type:'text/csv'}));
  a.download=`breaks-${todayISO()}.csv`;
  a.click();
}

/* ── Simple query helper — always returns {data, error} ─────────────────── */
async function q(builder) {
  try {
    const res = await builder;
    return res;
  } catch(e) {
    return { data: null, error: e };
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════════════════════════════════ */
function App() {
  const [user,  setUser]  = useState(null);
  const [phase, setPhase] = useState('boot');

  useEffect(()=>{
    sb.auth.getSession().then(({ data:{ session } })=>{
      if(session?.user){ setUser(session.user); setPhase('app'); }
      else setPhase('login');
    });
    const { data:{ subscription } } = sb.auth.onAuthStateChange((_e, session)=>{
      if(session?.user){ setUser(session.user); setPhase('app'); }
      else { setUser(null); setPhase('login'); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  if(phase==='boot') return <Splash/>;
  if(phase==='login') return <Login/>;
  if(!user) return <Splash/>;

  const role = user.user_metadata?.app_role;
  const name = user.user_metadata?.display_name || user.email;
  const logout = ()=> sb.auth.signOut();

  return role==='admin'
    ? <AdminApp user={user} name={name} onLogout={logout}/>
    : <AgentApp user={user} name={name} onLogout={logout}/>;
}

/* ══════════════════════════════════════════════════════════════════════════
   AGENT
══════════════════════════════════════════════════════════════════════════ */
function AgentApp({ user, name, onLogout }) {
  const [logs,      setLogs]     = useState([]);
  const [activeRow, setActiveRow]= useState(null); // the open bt_logs row
  const [elapsed,   setElapsed]  = useState(0);
  const [maxBreaks, setMaxBreaks]= useState(3);
  const [nowCount,  setNowCount] = useState(0);
  const [loading,   setLoading]  = useState(true);
  const [err,       setErr]      = useState('');
  const timerRef = useRef(null);

  const loadData = useCallback(async()=>{
    setLoading(true); setErr('');
    const today = todayISO();

    // Today's logs for this agent
    const { data: myLogs, error: e1 } = await q(
      sb.from('bt_logs').select('*')
        .eq('user_id', user.id)
        .gte('start_time', today+'T00:00:00.000Z')
        .order('start_time', { ascending:false })
    );
    if(e1){ setErr(e1.message); setLoading(false); return; }
    setLogs(myLogs||[]);

    // Find if there's an open break for this agent
    const open = (myLogs||[]).find(l=>!l.end_time);
    if(open) setActiveRow(open);
    else setActiveRow(null);

    // Max concurrent setting
    const { data: cfg } = await q(
      sb.from('bt_settings').select('max_concurrent_breaks').eq('id',1).single()
    );
    if(cfg) setMaxBreaks(cfg.max_concurrent_breaks);

    // How many agents on break right now
    const { data: allActive } = await q(
      sb.from('bt_logs').select('id').is('end_time', null)
    );
    setNowCount((allActive||[]).length);
    setLoading(false);
  }, [user.id]);

  useEffect(()=>{ loadData(); },[loadData]);

  // Timer
  useEffect(()=>{
    if(activeRow){
      const start = new Date(activeRow.start_time).getTime();
      timerRef.current = setInterval(()=>setElapsed(Date.now()-start), 250);
    } else {
      clearInterval(timerRef.current);
      setElapsed(0);
    }
    return ()=>clearInterval(timerRef.current);
  },[activeRow]);

  const startBreak = async()=>{
    setErr('');
    // Re-check capacity live
    const { data: allActive } = await q(sb.from('bt_logs').select('id').is('end_time',null));
    const cnt = (allActive||[]).length;
    if(cnt >= maxBreaks){
      setErr(`Max break slots reached (${maxBreaks}). Wait for a colleague to return.`);
      return;
    }
    const now = new Date().toISOString();
    const { data, error } = await q(
      sb.from('bt_logs').insert({
        user_id: user.id, agent_name: name, start_time: now
      }).select().single()
    );
    if(error){ setErr('Could not start break: '+error.message); return; }
    setActiveRow(data);
    setLogs(prev=>[data,...prev]);
    setNowCount(c=>c+1);
  };

  const endBreak = async()=>{
    if(!activeRow) return;
    setErr('');
    const now     = new Date().toISOString();
    const durSecs = Math.round((new Date(now)-new Date(activeRow.start_time))/1000);
    const bType   = breakType(durSecs);
    const { error } = await q(
      sb.from('bt_logs').update({ end_time:now, duration_secs:durSecs, break_type:bType })
        .eq('id', activeRow.id)
    );
    if(error){ setErr('Could not end break: '+error.message); return; }
    setLogs(prev=>prev.map(l=>l.id===activeRow.id
      ? {...l, end_time:now, duration_secs:durSecs, break_type:bType} : l
    ));
    setActiveRow(null);
    setNowCount(c=>Math.max(0,c-1));
  };

  const completed = logs.filter(l=>l.end_time);
  const totalSec  = completed.reduce((s,l)=>s+(l.duration_secs||0),0);
  const predType  = activeRow ? breakType(Math.floor(elapsed/1000)) : null;
  const atCap     = nowCount >= maxBreaks;

  return (
    <div className="ag-root">
      <header className="ag-hd">
        <div className="fc g8"><div className="logo-mark sm"><Ic n="zap" size={14} sw={2.5}/></div><span className="logo-text">BreakTrack</span></div>
        <div className="fc g10">
          <div className="av">{ini(name)}</div>
          <span className="hd-name">{name}</span>
          <button className="ib" onClick={onLogout} title="Sign out"><Ic n="logout" size={15}/></button>
        </div>
      </header>

      <div className="ag-body">
        {err && <div className="aerr"><Ic n="alert" size={14}/> {err}</div>}
        {atCap && !activeRow && (
          <div className="awarn"><Ic n="alert" size={16}/> Max break slots used ({nowCount}/{maxBreaks}). Please wait for a colleague to return.</div>
        )}

        {/* Break card */}
        <div className="bcard">
          <div className="bcard-top">
            <div className={`pulse-ring${activeRow?' on':''}`}>
              <div className={`bic${activeRow?' on':''}`}>
                <Ic n={activeRow ? 'timer' : 'coffee'} size={32} sw={1.5}/>
              </div>
            </div>
            {activeRow ? (
              <>
                <div className="timer-big">{tStrMs(elapsed)}</div>
                <div className="timer-lbl">On Break</div>
                {predType && <span className={`badge ${TYPE_CLS[predType]} timer-type`}>{predType}</span>}
                <div className="timer-since">Started at {fmt(activeRow.start_time)}</div>
              </>
            ) : (
              <>
                <div className="idle-lbl">Ready to take a break?</div>
                <div className="idle-sub">Your break will be logged and timed automatically</div>
              </>
            )}
          </div>
          <div className="bcard-foot">
            {!activeRow
              ? <button className="btn-start" onClick={startBreak} disabled={atCap||loading}>
                  <Ic n="play" size={16} sw={2.5}/> Start Break
                </button>
              : <button className="btn-stop" onClick={endBreak}>
                  <Ic n="stop" size={16} sw={2.5}/> Return from Break
                </button>
            }
          </div>
        </div>

        {/* Daily summary */}
        <div className="day-bar">
          <div className="day-stat">
            <div className="day-stat-lbl">Breaks today</div>
            <div className="day-stat-val">{completed.length}</div>
          </div>
          <div className="day-stat">
            <div className="day-stat-lbl">Total time</div>
            <div className="day-stat-val" style={{fontSize:18}}>{durStr(totalSec)}</div>
          </div>
          <div className="day-stat">
            <div className="day-stat-lbl">Team on break</div>
            <div className="day-stat-val" style={{color:atCap?'var(--danger)':'var(--accent)'}}>
              {nowCount}<span style={{fontSize:14,color:'var(--muted)',fontWeight:500}}>/{maxBreaks}</span>
            </div>
          </div>
        </div>

        {/* Today's history */}
        <div className="sc">
          <div className="sc-hd">
            <span className="sc-ic"><Ic n="clock" size={15}/></span>
            <h2 className="sc-title">Today's Breaks</h2>
            <button className="ib" style={{marginLeft:'auto'}} onClick={loadData} title="Refresh"><Ic n="refresh" size={14}/></button>
          </div>
          {loading ? <div className="es"><div className="spin"/></div>
            : logs.length===0
              ? <div className="es"><span className="es-ic"><Ic n="coffee" size={36} sw={1.2}/></span><p>No breaks yet today</p></div>
              : (
                <table className="dt">
                  <thead><tr><th>Start</th><th>Return</th><th>Duration</th><th>Type</th></tr></thead>
                  <tbody>
                    {logs.map(l=>(
                      <tr key={l.id}>
                        <td>{fmt(l.start_time)}</td>
                        <td>{l.end_time ? fmt(l.end_time) : <span className="badge b-active">On Break</span>}</td>
                        <td>{l.end_time ? durStr(l.duration_secs) : <LiveSec start={l.start_time}/>}</td>
                        <td>{l.break_type ? <BBadge type={l.break_type}/> : l.end_time ? '—' : <LiveType start={l.start_time}/>}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )
          }
        </div>
      </div>
    </div>
  );
}

/* ── Admin Dashboard ─────────────────────────────────────────────────────── */
function ADash() {
  const [allLogs,  setAllLogs]  = useState([]);
  const [maxB,     setMaxB]     = useState(3);
  const [loading,  setLoading]  = useState(true);
  const [err,      setErr]      = useState('');
  const [rtStatus, setRtStatus] = useState('connecting');

  const loadAll = useCallback(async()=>{
    setErr('');
    // Load settings
    const { data:cfg, error:e1 } = await q(sb.from('bt_settings').select('*').eq('id',1).single());
    if(e1 && e1.code!=='PGRST116') { setErr('Settings error: '+e1.message); }
    if(cfg) setMaxB(cfg.max_concurrent_breaks);

    // Load all logs (last 200)
    const { data:logs, error:e2 } = await q(
      sb.from('bt_logs').select('*').order('start_time',{ascending:false}).limit(200)
    );
    if(e2){ setErr('Logs error: '+e2.message); setLoading(false); return; }
    setAllLogs(logs||[]);
    setLoading(false);
  },[]);

  useEffect(()=>{
    loadAll();
    // Realtime subscription
    const channel = sb.channel('admin-dash')
      .on('postgres_changes', { event:'*', schema:'public', table:'bt_logs' }, payload=>{
        setAllLogs(prev=>{
          if(payload.eventType==='INSERT') return [payload.new, ...prev];
          if(payload.eventType==='UPDATE') return prev.map(l=>l.id===payload.new.id ? payload.new : l);
          if(payload.eventType==='DELETE') return prev.filter(l=>l.id!==payload.old.id);
          return prev;
        });
      })
      .subscribe(status=>{
        setRtStatus(status==='SUBSCRIBED' ? 'live' : 'connecting');
      });
    return ()=>{ sb.removeChannel(channel); };
  },[loadAll]);

  const today     = todayISO();
  const todayLogs = allLogs.filter(l=>l.start_time.startsWith(today));
  const active    = allLogs.filter(l=>!l.end_time);
  const done      = allLogs.filter(l=>l.end_time && l.duration_secs);
  const todaySec  = todayLogs.filter(l=>l.duration_secs).reduce((s,l)=>s+l.duration_secs,0);
  const avgSec    = done.length ? Math.round(done.reduce((s,l)=>s+l.duration_secs,0)/done.length) : 0;

  return (
    <div className="panel">
      <div className="phd">
        <div>
          <h1 className="ptitle">Dashboard</h1>
          <p className="psub">All agents · live data</p>
        </div>
        <div className="fc g10">
          <span className={`rt-pill`}>
            <span className="rt-dot"/>
            {rtStatus==='live' ? 'Live' : 'Connecting…'}
          </span>
          <button className="bs" onClick={loadAll}><Ic n="refresh" size={14}/> Refresh</button>
        </div>
      </div>

      {err && <div className="err-box"><Ic n="alert" size={14}/> {err}</div>}

      {loading ? <div className="es"><div className="spin"/></div> : (
        <>
          <div className="sg4">
            <StatCard n="activity" label="Total All-Time"      value={allLogs.length}/>
            <StatCard n="timer"    label="On Break Now"        value={active.length}  ac={active.length>0&&active.length<maxB} wn={active.length>=maxB}/>
            <StatCard n="sun"      label="Breaks Today"        value={todayLogs.length}/>
            <StatCard n="clock"    label="Avg Duration"        value={durStr(avgSec)}/>
          </div>
          <div className="sg3">
            <StatCard n="trending" label="Today's Total Time"  value={durStr(todaySec)}/>
            <StatCard n="users"    label="Max Concurrent"      value={maxB}/>
            <StatCard n="wifi"     label="Capacity"            value={`${active.length}/${maxB}`} ac={active.length>0&&active.length<maxB} wn={active.length>=maxB}/>
          </div>

          {active.length>0 && (
            <div className="sc" style={{marginBottom:16}}>
              <div className="sc-hd"><span className="live-dot"/><h2 className="sc-title">Currently on Break ({active.length})</h2></div>
              <LogTable logs={active}/>
            </div>
          )}

          <div className="sc">
            <div className="sc-hd"><span className="sc-ic"><Ic n="clock" size={15}/></span><h2 className="sc-title">Recent Breaks</h2></div>
            {allLogs.length===0
              ? <div className="es"><span className="es-ic"><Ic n="activity" size={36} sw={1.2}/></span><p>No breaks logged yet</p></div>
              : <LogTable logs={allLogs.slice(0,15)} showDate/>
            }
          </div>
        </>
      )}
    </div>
  );
}

/* ── Admin Live ──────────────────────────────────────────────────────────── */
function ALive() {
  const [live,    setLive]   = useState([]);
  const [maxB,    setMaxB]   = useState(3);
  const [loading, setLoading]= useState(true);
  const [err,     setErr]    = useState('');
  const [rtStatus,setRtStatus]=useState('connecting');

  const loadLive = useCallback(async()=>{
    const { data, error } = await q(sb.from('bt_logs').select('*').is('end_time',null).order('start_time'));
    if(error){ setErr(error.message); setLoading(false); return; }
    setLive(data||[]);
    const { data:cfg } = await q(sb.from('bt_settings').select('max_concurrent_breaks').eq('id',1).single());
    if(cfg) setMaxB(cfg.max_concurrent_breaks);
    setLoading(false);
  },[]);

  useEffect(()=>{
    loadLive();
    const channel = sb.channel('admin-live')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'bt_logs'},payload=>{
        if(!payload.new.end_time) setLive(prev=>[...prev, payload.new]);
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'bt_logs'},payload=>{
        if(payload.new.end_time){
          setLive(prev=>prev.filter(l=>l.id!==payload.new.id));
        } else {
          setLive(prev=>prev.map(l=>l.id===payload.new.id ? payload.new : l));
        }
      })
      .subscribe(s=>setRtStatus(s==='SUBSCRIBED'?'live':'connecting'));
    return ()=>sb.removeChannel(channel);
  },[loadLive]);

  return (
    <div className="panel">
      <div className="phd">
        <div><h1 className="ptitle">Live Breaks</h1><p className="psub">{live.length}/{maxB} slots in use</p></div>
        <div className="fc g10">
          <span className="rt-pill"><span className="rt-dot"/>{rtStatus==='live'?'Live':'Connecting…'}</span>
          <button className="bs" onClick={loadLive}><Ic n="refresh" size={14}/> Refresh</button>
        </div>
      </div>
      {err && <div className="err-box"><Ic n="alert" size={14}/> {err}</div>}
      {loading ? <div className="es"><div className="spin"/></div>
        : live.length===0
          ? <div className="es"><span className="es-ic"><Ic n="coffee" size={40} sw={1.2}/></span><p>No agents currently on break</p></div>
          : (
            <div className="sc">
              <div className="sc-hd"><span className="live-dot"/><h2 className="sc-title">On Break Now</h2></div>
              <table className="dt">
                <thead><tr><th>Agent</th><th>Started</th><th>Elapsed</th><th>Predicted Type</th></tr></thead>
                <tbody>
                  {live.map(l=>(
                    <tr key={l.id}>
                      <td><AvC name={l.agent_name}/></td>
                      <td>{fmt(l.start_time)}</td>
                      <td><LiveSec start={l.start_time}/></td>
                      <td><LiveType start={l.start_time}/></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )
      }
    </div>
  );
}

function AAnalytics() {

  const [loading, setLoading]= useState(true);
  const [err,     setErr]   = useState('');

  useEffect(()=>{
    q(sb.from('bt_logs').select('agent_name,start_time,duration_secs,break_type')
      .not('duration_secs','is',null)
      .order('start_time',{ascending:false}).limit(2000))
      .then(({data,error})=>{
        if(error){ setErr(error.message); setLoading(false); return; }
        const rows = data||[];

        // Group by day
        const byDay = {};
        rows.forEach(l=>{
          const d = l.start_time.slice(0,10);
          if(!byDay[d]) byDay[d]={count:0,totalSec:0};
          byDay[d].count++;
          byDay[d].totalSec += l.duration_secs||0;
        });
        const dayArr = Object.entries(byDay)
          .map(([date,v])=>({date,count:v.count,totalSec:v.totalSec,avgSec:Math.round(v.totalSec/v.count)}))
          .sort((a,b)=>b.date.localeCompare(a.date)).slice(0,14);
        setDays(dayArr);

        // Group by agent
        const byAgent = {};
        rows.forEach(l=>{
          if(!byAgent[l.agent_name]) byAgent[l.agent_name]={count:0,totalSec:0};
          byAgent[l.agent_name].count++;
          byAgent[l.agent_name].totalSec += l.duration_secs||0;
        });
        const agentArr = Object.entries(byAgent)
          .map(([name,v])=>({name,count:v.count,totalSec:v.totalSec,avgSec:Math.round(v.totalSec/v.count)}))
          .sort((a,b)=>b.totalSec-a.totalSec);
        setAgents(agentArr);
        setLoading(false);
      });
  },[]);

  const overallAvg = days.length ? Math.round(days.reduce((s,d)=>s+d.avgSec,0)/days.length) : 0;

  return (
    <div className="panel">
      <div className="phd"><div><h1 className="ptitle">Analytics</h1><p className="psub">Break patterns · last 14 days</p></div></div>
      {err && <div className="err-box"><Ic n="alert" size={14}/> {err}</div>}
      {loading ? <div className="es"><div className="spin"/></div> : (
        <>
          <div className="sg3" style={{marginBottom:24}}>
            <StatCard n="sun"      label="Days tracked"        value={days.length}/>
            <StatCard n="clock"    label="Overall avg/session" value={durStr(overallAvg)}/>
            <StatCard n="users"    label="Agents tracked"      value={agents.length}/>
          </div>
          <div className="sc" style={{marginBottom:16}}>
            <div className="sc-hd"><span className="sc-ic"><Ic n="sun" size={15}/></span><h2 className="sc-title">Daily Breakdown</h2></div>
            {days.length===0 ? <div className="es"><p>No completed breaks yet</p></div> : (
              <table className="dt">
                <thead><tr><th>Date</th><th>Breaks</th><th>Total Time</th><th>Avg per Break</th></tr></thead>
                <tbody>
                  {days.map(d=>(
                    <tr key={d.date}>
                      <td style={{fontWeight:600}}>{fmtD(d.date+'T12:00:00')}</td>
                      <td>{d.count}</td>
                      <td>{durStr(d.totalSec)}</td>
                      <td>{durStr(d.avgSec)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
          <div className="sc">
            <div className="sc-hd"><span className="sc-ic"><Ic n="users" size={15}/></span><h2 className="sc-title">Per Agent</h2></div>
            {agents.length===0 ? <div className="es"><p>No data yet</p></div> : (
              <table className="dt">
                <thead><tr><th>Agent</th><th>Sessions</th><th>Total Time</th><th>Avg per Break</th></tr></thead>
                <tbody>
                  {agents.map(a=>(
                    <tr key={a.name}>
                      <td><AvC name={a.name}/></td>
                      <td>{a.count}</td>
                      <td>{durStr(a.totalSec)}</td>
                      <td>{durStr(a.avgSec)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </>
      )}
    </div>
  );
}

/* ── Admin Settings ──────────────────────────────────────────────────────── */
function ASettings() {
  const [maxB,  setMaxB]  = useState(3);
  const [saved, setSaved] = useState(false);
  const [busy,  setBusy]  = useState(false);
  const [err,   setErr]   = useState('');

  useEffect(()=>{
    q(sb.from('bt_settings').select('max_concurrent_breaks').eq('id',1).single())
      .then(({data,error})=>{
        if(error && error.code!=='PGRST116') setErr('Load error: '+error.message);
        if(data) setMaxB(data.max_concurrent_breaks);
      });
  },[]);

  const save = async()=>{
    setBusy(true); setErr(''); setSaved(false);
    const { error } = await q(
      sb.from('bt_settings').upsert({
        id: 1,
        max_concurrent_breaks: maxB,
        updated_at: new Date().toISOString()
      }, { onConflict:'id' })
    );
    if(error){ setErr('Save error: '+error.message); setBusy(false); return; }
    setSaved(true); setBusy(false);
    setTimeout(()=>setSaved(false), 3000);
  };

  return (
    <div className="panel">
      <div className="phd"><div><h1 className="ptitle">Settings</h1><p className="psub">Team break configuration</p></div></div>
      {err && <div className="err-box"><Ic n="alert" size={14}/> {err}</div>}

      <div className="sblock">
        <h2 className="sh">Max concurrent breaks</h2>
        <p className="sd">How many agents can be on break at the same time. Adjust daily based on how many agents are working — the rule is no more than half the team simultaneously.</p>
        <div className="num-input">
          <button className="num-btn" onClick={()=>setMaxB(n=>Math.max(1,n-1))}>−</button>
          <div className="num-val">{maxB}</div>
          <button className="num-btn" onClick={()=>setMaxB(n=>n+1)}>+</button>
        </div>
        <p style={{fontSize:12,color:'var(--muted)',marginTop:12}}>Agents see a warning and cannot start a break when this limit is reached.</p>
        <div style={{marginTop:20,display:'flex',alignItems:'center',gap:12}}>
          <button className="bp" onClick={save} disabled={busy}>
            {busy?<span className="spin-sm"/>:'Save'}
          </button>
          {saved && <span style={{color:'var(--accent)',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:5}}><Ic n="check" size={14}/> Saved successfully</span>}
        </div>
      </div>

      <div className="sblock">
        <h2 className="sh">Break type thresholds</h2>
        <p className="sd">Assigned automatically when an agent returns from break:</p>
        <table className="dt" style={{marginTop:0}}>
          <thead><tr><th>Type</th><th>Duration</th></tr></thead>
          <tbody>
            <tr><td><BBadge type="Bathroom Break"/></td><td>Less than 15 minutes</td></tr>
            <tr><td><BBadge type="Break"/></td><td>15 minutes to 1 hour</td></tr>
            <tr><td><BBadge type="Lunch Break"/></td><td>More than 1 hour</td></tr>
          </tbody>
        </table>
      </div>

      <div className="sblock">
        <h2 className="sh">Adding users</h2>
        <p className="sd">Users are managed in Supabase Auth. After inviting a user, set their metadata:</p>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px',fontFamily:'monospace',fontSize:12,color:'#aaa',lineHeight:2}}>
          Auth → Users → Invite user → set password<br/>
          Edit user → Raw User Meta Data:<br/>
          <span style={{color:'var(--accent)'}}>{`{ "role": "agent", "display_name": "Jane Smith" }`}</span><br/>
          <span style={{color:'var(--accent)'}}>{`{ "role": "admin", "display_name": "Admin Name" }`}</span>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   SHARED COMPONENTS
══════════════════════════════════════════════════════════════════════════ */
function StatCard({ n, label, value, ac, wn }) {
  return (
    <div className={`stat${ac?' ac':''}${wn?' wn':''}`}>
      <div className="stat-ic"><Ic n={n} size={16} sw={1.8}/></div>
      <div className="stat-val">{value}</div>
      <div className="stat-lbl">{label}</div>
    </div>
  );
}

function AvC({ name }) {
  return <div className="fc g10"><div className="av">{ini(name)}</div><span>{name}</span></div>;
}

function BBadge({ type }) {
  if(!type) return null;
  return <span className={`badge ${TYPE_CLS[type]||'b-break'}`}>{type}</span>;
}

function LiveSec({ start }) {
  const [s, setS] = useState(Math.round((Date.now()-new Date(start).getTime())/1000));
  useEffect(()=>{
    const id = setInterval(()=>setS(Math.round((Date.now()-new Date(start).getTime())/1000)),1000);
    return ()=>clearInterval(id);
  },[start]);
  return <span className="mono ac-txt" style={{fontWeight:700}}>{tStr(Math.max(0,s))}</span>;
}

function LiveType({ start }) {
  const [s, setS] = useState(Math.round((Date.now()-new Date(start).getTime())/1000));
  useEffect(()=>{
    const id = setInterval(()=>setS(Math.round((Date.now()-new Date(start).getTime())/1000)),5000);
    return ()=>clearInterval(id);
  },[start]);
  return <BBadge type={breakType(s)}/>;
}

function LogTable({ logs, showDate }) {
  return (
    <table className="dt">
      <thead>
        <tr>
          <th>Agent</th>
          {showDate && <th>Date</th>}
          <th>Start</th>
          <th>Return</th>
          <th>Duration</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody>
        {logs.map(l=>(
          <tr key={l.id}>
            <td><AvC name={l.agent_name}/></td>
            {showDate && <td style={{color:'var(--muted)',fontSize:12}}>{fmtD(l.start_time)}</td>}
            <td>{fmt(l.start_time)}</td>
            <td>{l.end_time ? fmt(l.end_time) : <span className="badge b-active">On Break</span>}</td>
            <td>{l.duration_secs!=null ? durStr(l.duration_secs) : l.end_time ? '—' : <LiveSec start={l.start_time}/>}</td>
            <td>{l.break_type ? <BBadge type={l.break_type}/> : l.end_time ? '—' : <LiveType start={l.start_time}/>}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
